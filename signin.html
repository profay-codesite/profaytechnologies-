<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profay Codesite - Sign In</title>

  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #fff;
  padding: 10px;
}

/* HEADER */
#myh1 {
  font-size: 20px;
  text-align: center;
  text-transform: uppercase;
  color: green;
  box-shadow: 3px 3px 10px lawngreen;
  border-radius: 10px;
  padding: 12px;
  margin: 10px auto 20px;
  width: 95%;
  max-width: 600px;
  line-height: 1.3;
}

/* CONTAINER */
.container {
  width: 95%;
  max-width: 350px;
  margin: 0 auto;
  padding: 18px;
  box-shadow: 3px 3px 10px lawngreen;
  border-radius: 15px;
  text-align: center;
}

/* TEXT */
.myp {
  font-size: 18px;
  color: green;
  font-weight: bold;
  margin-bottom: 15px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 10px;
  box-shadow: 2px 2px 5px lawngreen;
  outline: none;
  font-size: 14px;
}

/* BUTTON */
button {
  background: green;
  color: white;
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  font-size: 14px;
}

button:active {
  background: white;
  color: green;
}

/* OUTPUT */
#output {
  margin-top: 15px;
  font-weight: bold;
}

/* CONTINUE BUTTON */
.continue-btn {
  width: 95%;
  max-width: 350px;
  margin: 20px auto;
  display: block;
  padding: 12px;
}

/* =========================
   📱 SMALL PHONES
   ========================= */
@media (max-width: 480px) {
  body {
    padding: 8px;
  }

  #myh1 {
    font-size: 18px;
    padding: 10px;
  }

  .container {
    max-width: 100%;
    padding: 15px;
  }

  input, button {
    font-size: 13px;
  }
}

/* =========================
   📱 TABLETS
   ========================= */
@media (min-width: 600px) {
  #myh1 {
    font-size: 24px;
  }

  .container {
    max-width: 420px;
  }

  .myp {
    font-size: 20px;
  }

  input, button {
    font-size: 15px;
  }
}

/* =========================
   💻 LAPTOPS
   ========================= */
@media (min-width: 1024px) {
  #myh1 {
    font-size: 30px;
  }

  .container {
    max-width: 450px;
    padding: 25px;
  }

  input {
    padding: 12px;
  }
}

/* =========================
   🖥️ DESKTOP
   ========================= */
@media (min-width: 1440px) {
  #myh1 {
    font-size: 34px;
  }

  .container {
    max-width: 500px;
  }
}
  </style>
</head>

<body>

  <h1 id="myh1">💻 Profay Codesite</h1>

  <div class="container">

    <p class="myp">Sign in to continue</p>

    <!-- FORM -->
    <form onsubmit="signin(event)">

      <input id="name" type="text" placeholder="Enter your name*" required>
      <input id="email" type="email" placeholder="Enter your email*" required>
      <input id="password" type="password" placeholder="Enter your password*" required>

      <button type="submit">Sign In</button>

    </form>

    <p id="output"></p>

  </div>

  <a href="home.html">
    <button class="continue-btn">Continue</button>
  </a>

  <!-- SCRIPT -->
  <script>
    function signin(event) {
      event.preventDefault(); // stop reload

      let name = document.getElementById('name').value.trim();
      let email = document.getElementById('email').value.trim();
      let password = document.getElementById('password').value.trim();
      let display = document.getElementById('output');

      if (name && email && password) {
        display.innerHTML = `Hey ${name}, you've signed in successfully.`;
        display.style.color = "green";
      } else {
        display.innerHTML = "Error! Fill in all fields!";
        display.style.color = "red";
      }
    }
  </script>

</body>

</html>
